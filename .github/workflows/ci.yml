name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install .[dev]
      - run: ruff check .
      - run: mypy src/bgnet
      - run: pytest
      - run: python -m build
      - run: pip install dist/*.whl
      - run: bgnet-env-check

  braindecode-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install .[braindecode,dev]
      - run: python -c "from bgnet.braindecode import BraindecodeBGNet; m=BraindecodeBGNet(n_outputs=2, n_chans=19, sfreq=256, channel_names=['Fp1','Fp2','F7','F3','Fz','F4','F8','T3','C3','Cz','C4','T4','T5','P3','Pz','P4','T6','O1','O2'], preset='clinical'); print(type(m).__name__)"
