name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install .[dev]
      - run: ruff check .
      - run: pytest
      - run: python -m build
      - run: twine check dist/*
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

